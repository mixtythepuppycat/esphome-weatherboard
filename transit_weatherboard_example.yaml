substitutions:
  project_version: "dev"

esphome:
  name: transit-tracker
  friendly_name: Transit Tracker + Weatherboard
  name_add_mac_suffix: true
  min_version: 2026.1.4
  project:
    name: "Eastside Urbanism.Transit Tracker + Weatherboard"
    version: ${project_version}
  includes:
    - std_includes.h

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: arduino

external_components:
  - source: github://pr#13921
    components: [ hub75 ]
    refresh: 1h
  - source: github://tjhorner/esphome-custom-components@c57ffd46fcf30badb2838421e8ff6cbeb9c1dd06
    components: [ serial_rpc, lis3dh, project_version ]
  - source: github://tjhorner/esphome-transit-tracker@adfd74561039a859075f962cef06516e1a771427
    refresh: 0s

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

api:
  reboot_timeout: 0s

http_request:
  verify_ssl: false

ota:
  - platform: http_request
  - platform: esphome
    password: ""

update:
  - platform: http_request
    name: Firmware Update
    source: https://transit-tracker.eastsideurbanism.org/firmware/manifest.json

switch:
  - platform: template
    id: flip_display_config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_180_DEGREES);
    turn_off_action:
      - lambda: |-
          id(matrix).set_rotation(esphome::display::DisplayRotation::DISPLAY_ROTATION_0_DEGREES);
  - platform: template
    id: scroll_headsigns_config
    name: "Scroll Headsigns"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(tracker).set_scroll_headsigns(true);
    turn_off_action:
      - lambda: id(tracker).set_scroll_headsigns(false);

button:
  - platform: restart
    name: "Restart"
  - platform: template
    id: reload_tracker
    on_press:
      - lambda: |-
          id(tracker).reconnect();
  - platform: template
    id: write_preferences
    on_press:
      - lambda: |-
          global_preferences->sync();
  - platform: template
    id: busy_display_config
    name: "busy"
    on_press:
      - display.page.show: busy_page
  - platform: template
    id: show_time_config
    name: "showtime"
    on_press:
      - display.page.show: time_page
  - platform: template
    id: trans_display_config
    name: "trans"
    on_press:
      - display.page.show: transit_schedule

text:
  - &config_text_common
    platform: template
    id: base_url_config
    mode: text
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: |
          id(tracker).set_base_url(id(base_url_config)->state);
  - <<: *config_text_common
    id: feed_code_config
    on_value:
      then:
        lambda: |
          id(tracker).set_feed_code(id(feed_code_config)->state);
  - <<: *config_text_common
    id: schedule_config
    on_value:
      then:
        lambda: |
          id(tracker).set_schedule_string(id(schedule_config)->state);
  - <<: *config_text_common
    id: abbreviations_config
    on_value:
      then:
        lambda: |
          id(tracker).set_abbreviations_from_text(id(abbreviations_config)->state);
  - <<: *config_text_common
    id: route_styles_config
    on_value:
      then:
        lambda: |
          id(tracker).set_route_styles_from_text(id(route_styles_config)->state);
  - <<: *config_text_common
    id: now_str_config
    initial_value: "min"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_now_string(id(now_str_config)->state);
  - <<: *config_text_common
    id: min_long_str_config
    initial_value: "min"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_minutes_long_string(id(min_long_str_config)->state);
  - <<: *config_text_common
    id: min_short_str_config
    initial_value: "m"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_minutes_short_string(id(min_short_str_config)->state);
  - <<: *config_text_common
    id: hours_short_str_config
    initial_value: "h"
    on_value:
      then:
        lambda: |-
          id(tracker).get_localization()->set_hours_short_string(id(hours_short_str_config)->state);

select:
  - platform: template
    id: time_display_config
    optimistic: true
    restore_value: true
    options:
      - "departure"
      - "arrival"
    on_value:
      then:
        lambda: |-
          id(tracker).set_display_departure_times(id(time_display_config)->current_option() == "departure");
  - platform: template
    id: time_units_config
    optimistic: true
    restore_value: true
    options:
      - "long"
      - "short"
      - "none"
    on_value:
      then:
        lambda: |-
          transit_tracker::UnitDisplay unit_display;
          if (id(time_units_config)->current_option() == "long") {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_LONG;
          } else if (id(time_units_config)->current_option() == "short") {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_SHORT;
          } else {
            unit_display = transit_tracker::UnitDisplay::UNIT_DISPLAY_NONE;
          }

          id(tracker).set_unit_display(unit_display);
  - platform: template
    id: list_mode_config
    optimistic: true
    restore_value: true
    options:
      - "sequential"
      - "nextPerRoute"
    on_value:
      then:
        lambda: |-
          id(tracker).set_list_mode(id(list_mode_config)->current_option());

output:
  - platform: template
    id: display_brightness_output
    type: float
    min_power: 0.004 # 1/255
    zero_means_zero: true
    write_action:
      - hub75.set_brightness:
          id: matrix
          brightness: !lambda return state * 255.0;

light:
  - platform: monochromatic
    name: Display Brightness
    id: display_brightness
    output: display_brightness_output
    restore_mode: RESTORE_DEFAULT_ON

status_led:
  pin:
    number: GPIO13

script:
  - id: dim_display
    parameters:
      up: bool
    then:
      - light.dim_relative:
          id: display_brightness
          relative_brightness: !lambda "return up ? 0.2 : -0.2;"
          transition_length: 0.1s

binary_sensor:
  - platform: template
    id: both_buttons
    lambda: |-
      return id(up_button).state && id(down_button).state;
    on_press:
      then:
        - display.page.show_next: matrix
  - platform: gpio
    id: up_button
    pin: &button_pin_cfg
      number: GPIO6
      inverted: true
      mode:
        input: true
        pullup: true
    filters: &button_filters
      - autorepeat:
        - delay: 500ms
          time_off: 300ms
          time_on: 100ms
    on_press:
      then:
        - script.execute:
            id: dim_display
            up: !lambda "return !id(flip_display_config).state;"
  - platform: gpio
    id: down_button
    pin:
      <<: *button_pin_cfg
      number: GPIO7
    filters: *button_filters
    on_press:
      then:
        - script.execute:
            id: dim_display
            up: !lambda "return id(flip_display_config).state;"

i2c:
  sda: GPIO16
  scl: GPIO17

lis3dh:
  range: 2G
  data_rate: 1HZ
  resolution: HIGH_RES
  address: 0x19
  update_interval: 1s

text_sensor:
  - platform: project_version
    id: project_version_text
  - platform: lis3dh
    orientation_xy:
      id: orientation_sensor
      on_value:
        then:
          - if:
              condition:
                lambda: |-
                  return x == "Portrait Upside Down";
              then:
                - switch.turn_on: flip_display_config
          - if:
              condition:
                lambda: |-
                  return x == "Portrait Upright";
              then:
                - switch.turn_off: flip_display_config
  - platform: homeassistant
    id: ha_temperature
    entity_id: weather.openweathermap
    attribute: temperature
  - platform: homeassistant
    id: ha_rain_description
    entity_id: input_text.next_hour_rain_description
  - platform: homeassistant
    id: ha_today_precipitation_description
    entity_id: input_text.today_precipitation_description
  - platform: homeassistant
    id: ha_rain_values
    entity_id: input_text.rain_values
    filters:
      - substitute: 
        - "[ ->"
        - "] ->"
          
  - platform: homeassistant
    id: ha_weather_state
    entity_id: weather.openweathermap
    on_value: 
      then:
        - homeassistant.action: 
            action: openweathermap.get_minute_forecast
            data:
              entity_id: weather.openweathermap

number:
  - platform: homeassistant
    id: ha_today_high_temp
    entity_id: input_number.today_high_temp
  - platform: homeassistant
    id: ha_today_low_temp
    entity_id: input_number.today_low_temp
  - platform: homeassistant
    id: ha_today_rain_chance
    entity_id: input_number.today_rain_chance

sensor:
  - platform: uptime
    type: timestamp
    name: Uptime
  - platform: homeassistant
    id: sun_elevation
    entity_id: sun.sun
    attribute: elevation
  - platform: copy
    source_id: sun_elevation
    id: is_daytime
    filters:
      - lambda: |-
          if(id(sun_elevation).state > 0) {
            return true;
          } else {
            return false;
          }

display:
  - platform: hub75
    id: matrix
    board: adafruit-matrix-portal-s3
    double_buffer: true
    update_interval: 32ms
    panel_width: 64
    panel_height: 32
    layout_cols: 2
    # We swap the G and B channels in firmware because the 64x32 panel hardware has them reversed
    g1_pin: 40
    b1_pin: 41
    g2_pin: 37
    b2_pin: 39
    e_pin: 21
    brightness: 255
    pages:
      - id: transit_schedule
        lambda: |-
          id(tracker).draw_schedule();
      - id: ip_address_page
        lambda: |-
          int x = it.get_width() / 2;
          int y = it.get_height() / 2;

          auto ip_addresses = ::esphome::network::get_ip_addresses();
          if (ip_addresses.empty()) {
            it.printf(x, y, id(pixolletta), COLOR_ON, TextAlign::CENTER, "No IP Address");
            return;
          }

          it.printf(x, y, id(pixolletta), COLOR_ON, TextAlign::CENTER, "%s", ip_addresses[0].str().c_str());
      - id: weather_page
        lambda: |-
          const char* icon;
          std::string weather_state = id(ha_weather_state).state;

          if (weather_state == "sunny") {
            icon = "\U000F0599";
          } else if (weather_state == "partlycloudy" && id(is_daytime).state) {
            icon = "\U000F0595";
          } else if (weather_state == "partlycloudy") {
            icon = "\U000F0F31";
          } else if (weather_state == "cloudy") {
            icon = "\U000F0590";
          } else if (weather_state == "rainy") {
            icon = "\U000F0597"; 
          } else if (weather_state == "snowy") {
            icon = "\U000F0598";
          } else if (weather_state == "pouring") {
            icon = "\U000F0596";          
          } else if (weather_state == "lightning") {
            icon = "\U000F0593";           
          } else if (weather_state == "clear-night") {
            icon = "\U000F0594";  
          } else if (weather_state == "fog") {
            icon = "\U000F0591";     
          } else if (weather_state == "hail") {
            icon = "\U000F0592";   
          } else if (weather_state == "lightning-rainy") {
            icon = "\U000F067E";                  
          } else if (weather_state == "snowy-rainy") {
            icon = "\U000F0F35";                    
          } else if (weather_state == "windy") {
            icon = "\U000F059D";       
          } else if (weather_state == "windy-variant") {
            icon = "\U000F059E";                                               
          } else if (weather_state == "exceptional") {
            icon = "\U000F0F2F";       
          } else {                
            icon = "\U000F0F2F";
          }

          if(id(ha_rain_description).state == "No rain") {
            auto rain_text_color = COLOR_ON;
            
            if(id(ha_today_precipitation_description).state != "No rain today") {
              rain_text_color = id(color_yellow);
            }

            it.printf(it.get_width(), it.get_height(), id(pixolletta), rain_text_color, TextAlign::BOTTOM_RIGHT, "%s", id(ha_today_precipitation_description).state.c_str());

            auto now = id(sntp_time).now();
            // Using this method to display non-padded hour since strtime doesn't support %-I
            if (now.is_valid()) {
              // Use printf to format the hour and minute as integers
              it.printf(it.get_width(), 1, id(pixolletta20), COLOR_ON, TextAlign::TOP_RIGHT, "%d:%02d", now.hour, now.minute);
            } else {
              it.print(0, 0, id(pixolletta), COLOR_ON, TextAlign::TOP_RIGHT, "Invalid Time");
            }
          } else {
            int graphX = 65;
            std::string list_data = id(ha_rain_values).state;

            // Draw graph boarders
            int x_left = graphX - 1;
            int x_right = graphX + 60;
            int y_top = 1;
            int y_bottom = it.get_height() - 13;
            it.line(x_left, y_bottom, x_right, y_bottom); // BOTTOM
            it.line(x_left, y_bottom, x_left, y_top); // LEFT
            it.line(x_left, y_top, x_right, y_top); // TOP
            it.line(x_right, y_top, x_right, y_bottom); // RIGHT

            // Simple comma-separated parsing example
            std::istringstream ss(list_data);
            std::string item;
            while (std::getline(ss, item, ',')) {
              int num = std::stoi(item);
              if(num > 0) {
                // Scale up value for graph size
                num *= 2;
                if(num > 16) {
                  num = 16;
                }
                it.line(graphX, it.get_height() - 14, graphX, it.get_height() - num - 14, id(color_blue));
              }

              graphX++;
            }
            it.printf(it.get_width(), it.get_height(), id(pixolletta), id(color_red), TextAlign::BOTTOM_RIGHT, "%s", id(ha_rain_description).state.c_str());
          }

          it.printf(2, 0, id(icon_font), COLOR_ON, TextAlign::TOP_LEFT, "%s", icon);
          it.printf(5, it.get_height(), id(pixolletta), COLOR_ON, TextAlign::BOTTOM_LEFT, "%s°", id(ha_temperature).state.c_str());

          it.printf(28, y - 6, id(pixolletta), COLOR_ON, TextAlign::CENTER_LEFT, "H: %.0f°", id(ha_today_high_temp).state);
          it.printf(28, y + 6, id(pixolletta), COLOR_ON, TextAlign::CENTER_LEFT, "L: %.0f°", id(ha_today_low_temp).state);

