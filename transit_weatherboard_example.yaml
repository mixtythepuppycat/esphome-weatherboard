color:
  - id: color_red
    red: 100%
  - id: color_blue
    blue: 100%
  - id: color_yellow
    hex: FFFF00

time:
  - platform: sntp
    id: sntp_time
    timezone: America/Los_Angeles

web_server:

transit_tracker: 
  # Put your config from https://transit-tracker.eastsideurbanism.org/configurator here

serial_rpc:
